# Render Blueprint. Render 대시보드 > New > Blueprint 에서 이 저장소를 연결하면
# rootDir(backend) 기준으로 서비스가 생성됨. OPENAI_API_KEY 등은 대시보드에서 직접 입력(sync: false).

services:
  - type: web
    name: localhub-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./app/db/localhub.db
      - key: REGION
        value: 대전/충청권
